<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>大怪兽的游戏测试Demo</title>

  <!-- 原 meta 标签保留 -->
  <meta name="viewport"
    content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="full-screen" content="yes" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="360-fullscreen" content="true" />
  <meta name="renderer" content="webkit" />
  <meta name="force-rendering" content="webkit" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <!-- 新的 CSS 样式 -->
  <style>
    /* 全局重置与基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial Rounded MT Bold', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* 背景动画 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 20%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 20%);
      z-index: -1;
      animation: pulse 4s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% {
        opacity: 0.3;
      }

      100% {
        opacity: 0.7;
      }
    }

    /* 顶部标题美化 */
    .header {
      font-size: 2.5rem;
      margin-bottom: 20px;
      background: linear-gradient(45deg, #fff, #f8f9fa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      position: relative;
      padding-bottom: 10px;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      border-radius: 2px;
    }

    /* 游戏容器美化 */
    #GameDiv {
      width: 100%;
      max-width: 926px;
      height: 428px;
      margin: 20px auto;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.2);
    }

    /* 自定义 Loading 遮罩 */
    #custom-loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    /* Loading 动画 */
    .loading-container {
      text-align: center;
      max-width: 300px;
    }

    .loading-logo {
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
      background: linear-gradient(45deg, #f46b45, #eea849);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      animation: rotate 3s linear infinite;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    @keyframes rotate {
      0% {
        transform: rotateY(0deg);
      }

      100% {
        transform: rotateY(360deg);
      }
    }

    .loading-title {
      font-size: 1.8rem;
      margin-bottom: 20px;
      background: linear-gradient(45deg, #fff, #f8f9fa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loading-text {
      font-size: 1rem;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    /* 进度条 */
    .progress-container {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 4px;
      transition: width 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent);
      animation: shine 1.5s infinite;
    }

    @keyframes shine {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    .progress-text {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 10px;
    }

    /* 游戏 Canvas 样式 */
    #GameCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 底部美化 */
    .footer {
      margin-top: 30px;
      opacity: 0.8;
      font-size: 0.9rem;
    }

    .footer a {
      color: #4facfe;
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer a:hover {
      color: #00f2fe;
      text-decoration: underline;
    }

    /* 提示标签 */
    .hint {
      margin-top: 15px;
      font-size: 0.8rem;
      opacity: 0.6;
      max-width: 300px;
      line-height: 1.4;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .header {
        font-size: 2rem;
      }

      #GameDiv {
        width: 100%;
        height: 400px;
        border-radius: 10px;
      }

      .loading-logo {
        width: 80px;
        height: 80px;
        font-size: 1.5rem;
      }

      .loading-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <h1 class="header">demo</h1>

  <!-- 自定义 Loading 遮罩 -->
  <div id="custom-loading">
    <div class="loading-container">
      <!-- <div class="loading-logo">🏃‍♂️</div> -->
      <h2 class="loading-title">资源加载中...</h2>
      <p class="loading-text">正在准备您的冒险之旅</p>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>

      <p class="hint">首次加载可能需要一点时间，请耐心等待</p>
    </div>
  </div>

  <!-- 游戏容器 -->
  <div id="GameDiv" cc_exact_fit_screen="false">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" tabindex="99"></canvas>
    </div>
  </div>

  <p class="footer">
    由 <a href="https://www.cocos.com/products" title="Cocos Creator" target="_blank">Cocos Creator</a> 强力驱动
  </p>
  <p class="footer">
    W,A,S,D,控制移动 空格实现跳跃 鼠标左键并拖拽可以切换视角
  </p>

  <!-- Polyfills bundle. -->
  <script src="src/polyfills.bundle.js" charset="utf-8"> </script>
  <!-- SystemJS support. -->
  <script src="src/system.bundle.js" charset="utf-8"> </script>
  <!-- Import map -->
  <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

  <!-- 加载控制脚本 -->

  <script>
    // 监听页面加载进度
    let totalAssets = 0;
    let loadedAssets = 0;
    let engineLoaded = false;
    let sceneLoaded = false;
    let cocosProgress = 0;

    // 更新进度
    function updateProgress(progress, message = '') {
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const loadingText = document.querySelector('.loading-text');

      if (progressBar && progressText) {
        const percent = Math.min(100, Math.floor(progress * 100));
        progressBar.style.width = percent + '%';
        progressText.textContent = percent + '%';

        if (loadingText && message) {
          loadingText.textContent = message;
        }

        // 加载完成后隐藏 Loading
        if (percent >= 100 && engineLoaded && sceneLoaded) {
          setTimeout(() => {
            const loading = document.getElementById('custom-loading');
            if (loading) {
              loading.style.opacity = '0';
              setTimeout(() => {
                loading.style.display = 'none';
              }, 500);
            }
          }, 800);
        }
      }
    }

    // 检测 Canvas 状态
    function checkCanvasState() {
      const canvas = document.getElementById('GameCanvas');
      if (!canvas) {
        console.log('Canvas 元素不存在');
        return false;
      }

      // 检查 Canvas 是否可见
      const style = window.getComputedStyle(canvas);
      if (style.display === 'none' || style.visibility === 'hidden') {
        console.log('Canvas 被隐藏');
        return false;
      }

      // 检查 Canvas 是否具有有效尺寸
      if (canvas.width === 0 || canvas.height === 0) {
        console.log('Canvas 尺寸为 0');
        return false;
      }

      // 检查 Canvas 上下文
      try {
        const context = canvas.getContext('webgl') || canvas.getContext('experimental-webgl') || canvas.getContext('2d');
        if (!context) {
          console.log('Canvas 上下文创建失败');
          return false;
        }
      } catch (e) {
        console.log('Canvas 上下文检查异常:', e);
        return false;
      }

      console.log('Canvas 状态正常');
      return true;
    }

    // 监听引擎加载事件
    window.addEventListener('cocos-engine-loaded', function () {
      console.log('Cocos 引擎加载完成');
      engineLoaded = true;

      // 检查 Canvas
      if (checkCanvasState()) {
        updateProgress(0.3, '引擎初始化完成...');

        // 尝试获取 Cocos 引擎实例
        if (typeof cc !== 'undefined' && cc.assetManager) {
          // 监听资源管理器加载进度
          setTimeout(monitorCocosLoading, 100);
        } else {
          // 如果没有 cc.assetManager，使用备用方案
          console.log('Cocos assetManager 未找到');
          simulateProgress();
        }
      }
    });

    // 监听 Cocos 引擎资源加载（兼容 Cocos Creator 3.x）
    function monitorCocosLoading() {
      if (typeof cc === 'undefined') {
        console.log('Cocos 引擎未加载');
        return;
      }

      console.log('开始监控 Cocos 加载进度');

      // 方法1：监听 director 的 scene-change 事件
      if (cc.director) {
        // 监听场景加载前
        cc.director.on(cc.Director.EVENT_BEFORE_SCENE_LAUNCH, function () {
          console.log('场景开始加载');
          updateProgress(0.6, '场景加载中...');
        });

        // 监听场景加载后
        cc.director.on(cc.Director.EVENT_AFTER_SCENE_LAUNCH, function () {
          console.log('场景加载完成');
          sceneLoaded = true;
          cocosProgress = 1;
          updateProgress(0.95, '场景初始化...');

          // 最后检查一次 Canvas
          setTimeout(() => {
            if (checkCanvasState()) {
              updateProgress(1, '加载完成！');
            } else {
              updateProgress(1, '加载完成，准备启动');
            }
          }, 500);
        });

        // 监听场景切换
        cc.director.on(cc.Director.EVENT_SCENE_CHANGE, function (scene) {
          console.log('场景切换:', scene);
        });
      }

      // 方法2：如果 assetManager 有 onProgress 方法
      if (cc.assetManager && typeof cc.assetManager.onProgress === 'function') {
        cc.assetManager.onProgress(function (completed, total, item) {
          if (total > 0) {
            cocosProgress = completed / total;
            const progress = 0.3 + cocosProgress * 0.3; // 30% ~ 60%
            updateProgress(progress, `资源加载中: ${Math.round(cocosProgress * 100)}%`);
          }
        });
      }

      // 方法3：监听资源加载
      if (cc.assetManager && cc.assetManager.downloader) {
        // 可以尝试监听下载器
        console.log('找到 assetManager.downloader');
      }

      // 方法4：监听系统事件
      if (cc.sys && cc.sys.on) {
        cc.sys.on(cc.SystemEventType.GAME_INITED, function () {
          console.log('游戏初始化完成');
          updateProgress(0.8, '游戏初始化完成...');
        });
      }

      // 如果以上方法都不行，使用备用进度
      setTimeout(() => {
        if (cocosProgress === 0) {
          console.log('使用备用进度监控');
          simulateCocosProgress();
        }
      }, 1000);
    }

    // 模拟 Cocos 进度
    function simulateCocosProgress() {
      let progress = 0.3;
      const interval = setInterval(() => {
        progress += 0.05;
        if (progress > 0.9) {
          progress = 0.9;
          clearInterval(interval);

          // 假设场景在 5 秒后加载完成
          setTimeout(() => {
            sceneLoaded = true;
            updateProgress(1, '加载完成！');
          }, 3000);
        }
        updateProgress(progress, '游戏资源加载中...');
      }, 500);
    }

    // 通用模拟进度
    function simulateProgress() {
      let progress = 0.3;
      const interval = setInterval(() => {
        progress += 0.05;
        if (progress > 1) {
          progress = 1;
          clearInterval(interval);
          sceneLoaded = true;
        }
        updateProgress(progress, progress < 0.8 ? '资源加载中...' : '场景初始化...');
      }, 500);
    }

    // 监听 WebGL 上下文创建
    const canvas = document.getElementById('GameCanvas');
    if (canvas) {
      const originalGetContext = canvas.getContext;
      canvas.getContext = function (type, attrs) {
        const context = originalGetContext.call(this, type, attrs);
        if (context) {
          console.log('WebGL 上下文已创建');
          updateProgress(0.4, '图形系统初始化...');
        }
        return context;
      };
    }

    // 启动游戏时的初始进度
    updateProgress(0.1, '初始化游戏环境...');

    // 启动游戏
    System.import('./index.js')
      .then(function () {
        console.log('游戏脚本加载完成');
        updateProgress(0.2, '游戏脚本加载完成...');

        // 设置超时检查
        setTimeout(() => {
          if (!engineLoaded) {
            console.log('引擎加载超时，尝试直接检测');
            if (typeof cc !== 'undefined') {
              engineLoaded = true;
              // 延迟执行，确保引擎完全初始化
              setTimeout(() => {
                monitorCocosLoading();
              }, 1000);
            } else {
              // 如果 cc 还是 undefined，使用模拟进度
              console.log('Cocos 引擎仍未加载，使用模拟进度');
              simulateProgress();
            }
          }
        }, 5000);
      })
      .catch(function (err) {
        console.error('游戏加载失败:', err);
        showError('脚本加载失败', err.message);
      });

    // 显示错误
    function showError(title, message) {
      const loading = document.getElementById('custom-loading');
      if (loading) {
        loading.innerHTML =
          '<div style="color: #ff6b6b; padding: 20px; text-align: center;">' +
          '<h3>' + title + '</h3>' +
          '<p>' + message + '</p>' +
          '<button onclick="window.location.reload()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;">刷新页面</button>' +
          '</div>';
      }
    }

    // 全局错误处理
    window.addEventListener('error', function (e) {
      console.error('全局错误:', e);

      // 如果 Canvas 创建失败
      if (e.target && e.target.id === 'GameCanvas') {
        showError('Canvas 创建失败', '您的浏览器可能不支持 WebGL');
      }

      // 如果错误是来自我们的监控代码
      if (e.message && e.message.includes('cc.assetManager')) {
        console.log('Cocos API 调用错误，使用备用方案');
        // 忽略这个错误，让备用方案接管
        e.preventDefault();
        e.stopPropagation();
      }
    });

    // 监听页面可见性变化
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        console.log('页面被隐藏');
      } else {
        // 页面重新可见时检查 Canvas
        if (!sceneLoaded) {
          checkCanvasState();
        }
      }
    });

    // 最终安全检查
    window.addEventListener('load', function () {
      setTimeout(() => {
        if (!sceneLoaded) {
          console.log('加载超时，强制完成');
          updateProgress(1, '加载完成');

          setTimeout(() => {
            const loading = document.getElementById('custom-loading');
            if (loading && loading.style.display !== 'none') {
              loading.style.opacity = '0';
              setTimeout(() => {
                loading.style.display = 'none';
              }, 500);
            }
          }, 1000);
        }
      }, 30000); // 30秒超时
    });
  </script>
</body>

</html>
